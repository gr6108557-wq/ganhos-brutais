(function(){
  // Same identity as login screen: 💪 emoji in blue ring
  function logo(s){
    try{
      const c=document.createElement('canvas');c.width=c.height=s;
      const x=c.getContext('2d');
      const bg=x.createLinearGradient(0,0,s,s);bg.addColorStop(0,'#050510');bg.addColorStop(1,'#0a0a20');
      x.fillStyle=bg;x.fillRect(0,0,s,s);
      // Blue glow ring
      x.shadowColor='#3B82F6';x.shadowBlur=s*.07;
      x.beginPath();x.arc(s/2,s/2,s*.42,0,Math.PI*2);x.strokeStyle='#3B82F6';x.lineWidth=s*.05;x.stroke();
      x.shadowBlur=0;
      // Radial glow
      const g=x.createRadialGradient(s/2,s/2,0,s/2,s/2,s*.38);g.addColorStop(0,'rgba(59,130,246,.28)');g.addColorStop(1,'transparent');
      x.fillStyle=g;x.beginPath();x.arc(s/2,s/2,s*.42,0,Math.PI*2);x.fill();
      // 💪 emoji in center
      x.font=`bold ${Math.round(s*.4)}px serif`;x.textAlign='center';x.textBaseline='middle';
      x.fillText('💪',s/2,s/2);
      return c.toDataURL('image/png');
    }catch{return '';}
  }
  try{
    const i192=logo(192),i512=logo(512);

function calcM(food,amount,unit){
  const a=parseFloat(amount)||0;const factor=unit==='unid'?a:a/100;
  return{cal:Math.round(food.c*factor*10)/10,prot:Math.round(food.p*factor*10)/10,carb:Math.round(food.cb*factor*10)/10,fat:Math.round(food.f*factor*10)/10};
}
function sumM(foods){return foods.reduce((a,f)=>({cal:a.cal+(f.cal||0),prot:a.prot+(f.prot||0),carb:a.carb+(f.carb||0),fat:a.fat+(f.fat||0)}),{cal:0,prot:0,carb:0,fat:0});}
function recomp(food,newAmt,newUnit){
  const a=parseFloat(newAmt)||0;const u=newUnit||food.unit;
  const db=FDB.find(f=>f.n===food.name);
  if(db){return{...food,amount:a,unit:u,...calcM(db,a,u)};}
  const r=food.amount>0?a/food.amount:0;
  return{...food,amount:a,unit:u,cal:Math.round((food.cal||0)*r*10)/10,prot:Math.round((food.prot||0)*r*10)/10,carb:Math.round((food.carb||0)*r*10)/10,fat:Math.round((food.fat||0)*r*10)/10};
}
function smartGoals(cal,kg,pm=1.9){const p=Math.round(kg>0?kg*pm:cal*.25/4);const f=Math.round((cal*.25)/9);const cb=Math.max(50,Math.round((cal-p*4-f*9)/4));return{cal,prot:p,carb:cb,fat:f};}
function mkFood(name,amount,unit){const fd=FDB.find(f=>f.n===name);const u=unit||fd?.u||'g';const m=fd?calcM(fd,amount,u):{cal:0,prot:0,carb:0,fat:0};return{id:_id(),name,amount,unit:u,...m};}
function foodUnits(fd){if(!fd)return['g'];const u=[fd.u];(fd.alt||[]).forEach(a=>{if(!u.includes(a))u.push(a);});return u;}

// ── TOUCH DRAG HOOK ──────────────────────────────────────
function useTouchDrag(items,onReorder,enabled=true){
  const [dragIdx,setDragIdx]=useState(null);
  const [overIdx,setOverIdx]=useState(null);
  const r=useRef({active:false,si:null,oi:null,timer:null});
  const commit=useCallback(()=>{
    const s=r.current;
    if(s.active&&s.si!==null&&s.oi!==null&&s.si!==s.oi){const arr=[...items];const[rm]=arr.splice(s.si,1);arr.splice(s.oi,0,rm);onReorder(arr);}
    s.active=false;s.si=null;s.oi=null;clearTimeout(s.timer);setDragIdx(null);setOverIdx(null);
  },[items,onReorder]);
  const cancel=useCallback(()=>{const s=r.current;s.active=false;s.si=null;s.oi=null;clearTimeout(s.timer);setDragIdx(null);setOverIdx(null);},[]);
  const findTarget=useCallback((x,y)=>{const els=document.elementsFromPoint(x,y);const t=els.find(el=>el.hasAttribute&&el.hasAttribute('data-di'));return t?parseInt(t.getAttribute('data-di')):null;},[]);
  const getHandle=useCallback((idx)=>{
    if(!enabled)return{};
    return{
      onMouseDown:e=>{e.preventDefault();const s=r.current;s.active=true;s.si=idx;s.oi=idx;setDragIdx(idx);
        const mv=me=>{const ti=findTarget(me.clientX,me.clientY);if(ti!==null){s.oi=ti;setOverIdx(ti);}};
        const up=()=>{commit();window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);};
        window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);},
      onTouchStart:()=>{const s=r.current;s.timer=setTimeout(()=>{s.active=true;s.si=idx;s.oi=idx;setDragIdx(idx);if(navigator.vibrate)navigator.vibrate([18]);},300);},
      onTouchMove:e=>{const s=r.current;if(!s.active){clearTimeout(s.timer);return;}e.preventDefault();const t=e.touches[0];const ti=findTarget(t.clientX,t.clientY);if(ti!==null){s.oi=ti;setOverIdx(ti);}},
      onTouchEnd:()=>{const s=r.current;clearTimeout(s.timer);if(s.active)commit();else cancel();},
      onTouchCancel:()=>cancel(),
      style:{cursor:'grab',userSelect:'none',WebkitUserSelect:'none',touchAction:r.current.active?'none':'auto'},
    };
  },[enabled,commit,cancel,findTarget]);
  const getItem=useCallback((idx)=>({'data-di':idx,className:[dragIdx===idx?'dg-ghost':'',overIdx===idx&&dragIdx!==null&&overIdx!==dragIdx?'dg-over':''].filter(Boolean).join(' ')}),[dragIdx,overIdx]);
  return{getHandle,getItem};
}

// ── UNDO ─────────────────────────────────────────────────
function useUndo(initial,max=15){
  const [state,setState]=useState(initial);
  const past=useRef([]);const fut=useRef([]);
  const set=useCallback((next,skip=false)=>{if(!skip){past.current=[...past.current.slice(-(max-1)),state];fut.current=[];}setState(next);},[state,max]);
  const undo=useCallback(()=>{if(!past.current.length)return false;const p=past.current[past.current.length-1];fut.current=[state,...fut.current.slice(0,max-1)];past.current=past.current.slice(0,-1);setState(p);return true;},[state,max]);
  const redo=useCallback(()=>{if(!fut.current.length)return false;const n=fut.current[0];past.current=[...past.current.slice(-(max-1)),state];fut.current=fut.current.slice(1);setState(n);return true;},[state,max]);
  return{state,set,undo,redo,canUndo:past.current.length>0,canRedo:fut.current.length>0};
}

          :(<div style={{background:'var(--bg3)',border:'1.5px solid var(--b1)',borderRadius:'var(--rsm)',height:53,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,color:'var(--t2)',fontSize:16}}>{unit}</div>)}
        </div>
      </div>
      {preview&&<div style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:12,marginBottom:14,border:'1px solid var(--b2)'}}>
        <div style={{fontSize:10,color:'var(--t3)',marginBottom:8,letterSpacing:1}}>MACROS PARA {amt}{unit}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:5}}>
          {[['Kcal',preview.cal,'var(--cyan)',''],['Prot',preview.prot,'var(--blue)','g'],['Carb',preview.carb,'var(--purple)','g'],['Gord',preview.fat,'var(--bluel)','g']].map(([l,v,c,u])=>(

          ))}
        </div>

      <Btn ch="ADICIONAR À REFEIÇÃO" onClick={doAdd} dis={!amt||parseFloat(amt)<=0}/>

  );
  return(
    <div className="fi">
      <label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:6,letterSpacing:1}}>BUSCAR ALIMENTO</label>
      <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Ex: frango, aveia, requeijão..." className="inp" style={{marginBottom:matches.length?8:0}}/>

        <div key={food.n} onClick={()=>selectFood(food)} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',borderRadius:'var(--rsm)',background:'var(--bg3)',marginBottom:5,cursor:'pointer',border:'1px solid var(--b2)',touchAction:'manipulation'}}>
          <div><div style={{fontSize:13,fontWeight:600}}>{food.n}</div><div style={{fontSize:10,color:'var(--t3)'}}>/ 100{food.u==='ml'?'ml':food.u==='unid'?'un':'g'}</div></div>
          <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:13,color:'var(--cyan)',fontWeight:700}}>{food.c}kcal</div><div style={{fontSize:10,color:'var(--t3)'}}>{food.p}p·{food.cb}c·{food.f}g</div></div>
        </div>

      {q.length>1&&!matches.length&&(

          <div style={{color:'var(--t2)',fontSize:13,padding:'10px 0',textAlign:'center'}}>Não encontrado — inserir manualmente:</div>

            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:8,marginBottom:8}}>
              <div><label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:3}}>QUANTIDADE</label><input type="number" value={man.amount} onChange={e=>setMan(p=>({...p,amount:e.target.value}))} className="inp" style={{fontSize:14}} placeholder="100"/></div>
              <div><label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:3}}>UNIDADE</label><select value={man.unit} onChange={e=>setMan(p=>({...p,unit:e.target.value}))} className="inp" style={{WebkitAppearance:'none',appearance:'none'}}><option>g</option><option>ml</option><option>unid</option></select></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {[['cal','Kcal','var(--cyan)'],['prot','Prot (g)','var(--blue)'],['carb','Carb (g)','var(--purple)'],['fat','Gord (g)','var(--bluel)']].map(([k,l,c])=>(
                <div key={k}><label style={{fontSize:10,color:c,display:'block',marginBottom:3}}>{l}</label><input type="number" value={man[k]} onChange={e=>setMan(p=>({...p,[k]:e.target.value}))} placeholder="0" className="inp" style={{fontSize:13,padding:'8px'}}/></div>
              ))}
            </div>
            <Btn ch="ADICIONAR" onClick={()=>onSelect({id:_id(),name:man.name||q,amount:parseFloat(man.amount)||100,unit:man.unit,cal:parseFloat(man.cal)||0,prot:parseFloat(man.prot)||0,carb:parseFloat(man.carb)||0,fat:parseFloat(man.fat)||0})}/>
          </div>
        </div>
      )}
      {onCancel&&<button onClick={onCancel} style={{background:'none',border:'none',color:'var(--t3)',fontSize:13,marginTop:12,cursor:'pointer',width:'100%',padding:'8px',touchAction:'manipulation'}}>Cancelar</button>}
    </div>
  );
}

// ── LOGIN ────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');const [name,setName]=useState('');const [pw,setPw]=useState('');
  const [mode,setMode]=useState('login');const [err,setErr]=useState('');const [busy,setBusy]=useState(false);
  const go=()=>{
    const e=(email||'').trim().toLowerCase();
    if(!emailOk(e)){setErr('E-mail inválido.');return;}
    if(pw.length<4){setErr('Senha: mínimo 4 caracteres.');return;}
    setBusy(true);setErr('');
    try{
      if(mode==='register'){
        if(!name.trim()){setErr('Digite seu nome.');setBusy(false);return;}
        if(Acct.byEmail(e)){setErr('E-mail já cadastrado. Faça login.');setBusy(false);return;}
        const uid=genId();
        Acct.save(uid,{userId:uid,name:name.trim(),email:e,passwordHash:btoa(pw),createdAt:nowISO(),schemaVersion:SCHEMA});
        Acct.idxEmail(e,uid);Acct.session.set(uid);onLogin(uid,Acct.get(uid),'new');
      }else{
        const uid=Acct.byEmail(e);if(!uid){setErr('E-mail não encontrado. Crie uma conta.');setBusy(false);return;}
        const rec=Acct.get(uid);if(!rec){setErr('Conta inválida.');setBusy(false);return;}
        if(rec.passwordHash&&btoa(pw)!==rec.passwordHash){setErr('Senha incorreta.');setBusy(false);return;}
        Acct.session.set(uid);onLogin(uid,rec,'existing');
      }
    }catch(ex){setErr('Erro. Tente novamente.');}
    setBusy(false);
  };
  return(
    <div style={{flex:1,background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px 24px',overflow:'auto'}}>
      <div style={{width:'100%',maxWidth:340}}>
        <div style={{textAlign:'center',marginBottom:44}}>
          <div style={{position:'relative',display:'inline-block',marginBottom:18}}>
            <div style={{width:90,height:90,borderRadius:'50%',background:'radial-gradient(circle,rgba(59,130,246,.32) 0%,transparent 70%)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,border:'2.5px solid rgba(59,130,246,.6)'}}>💪</div>
          </div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,letterSpacing:6,background:'linear-gradient(135deg,#fff 30%,var(--blue))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',lineHeight:1}}>GANHOS</div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,letterSpacing:6,color:'var(--blue)',lineHeight:.9}}>BRUTAIS</div>
          <div style={{color:'var(--t3)',fontSize:11,marginTop:10,letterSpacing:2}}>TREINO · DIETA · EVOLUÇÃO</div>
        </div>
        <div style={{display:'flex',background:'var(--bg3)',borderRadius:'var(--rsm)',padding:3,marginBottom:20,border:'1px solid var(--b2)'}}>
          {['login','register'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr('');}} style={{flex:1,border:'none',borderRadius:7,padding:'11px',cursor:'pointer',fontWeight:700,fontSize:13,touchAction:'manipulation',background:mode===m?'var(--blue)':'transparent',color:mode===m?'#fff':'var(--t3)',fontFamily:'inherit',transition:'all .18s'}}>{m==='login'?'Entrar':'Criar conta'}</button>
          ))}
        </div>
        {mode==='register'&&<div style={{marginBottom:10}}><label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>NOME COMPLETO</label><input value={name} onChange={e=>setName(e.target.value)} placeholder="Seu nome" className="inp" onKeyDown={e=>e.key==='Enter'&&go()}/></div>}
        <div style={{marginBottom:10}}><label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>E-MAIL</label><input type="email" inputMode="email" autoComplete="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" className="inp" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <div style={{marginBottom:18}}><label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>SENHA</label><input type="password" autoComplete={mode==='login'?'current-password':'new-password'} value={pw} onChange={e=>setPw(e.target.value)} placeholder="Mínimo 4 caracteres" className="inp" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {err&&<div style={{color:'#f87171',fontSize:13,marginBottom:12,textAlign:'center',background:'rgba(239,68,68,.12)',borderRadius:8,padding:'9px 14px'}}>{err}</div>}
        <Btn ch={busy?'AGUARDE...':mode==='login'?'ENTRAR':'CRIAR CONTA'} onClick={go} st={{opacity:busy?.6:1}}/>
        <p style={{color:'var(--t4)',fontSize:11,textAlign:'center',marginTop:12}}>Dados salvos localmente · funciona offline</p>
      </div>
    </div>
  );
}

// ── EXERCISE DETAIL ──────────────────────────────────────
function ExDetail({ex,workout,lh,onSave,onClose}){
  const k=`${workout.id}_${ex.id}`;const hist=(lh[k]||[]).slice().reverse();const last=hist[0];
  const [weight,setWeight]=useState(last?.weight?.toString()||'');const [reps,setReps]=useState(last?.reps?.toString()||'');const [obs,setObs]=useState(last?.obs||'');
  const [period,setPeriod]=useState('all');const [saved,setSaved]=useState(false);const [tab,setTab]=useState('log');
  const cd=(()=>{let d=(lh[k]||[]).map(e=>({d:e.date,v:e.weight}));if(period==='week')d=d.slice(-7);else if(period==='month')d=d.slice(-30);return d;})();
  const save=()=>{if(!weight)return;onSave(workout.id,ex.id,{weight:parseFloat(weight),reps,obs});setSaved(true);setTimeout(()=>setSaved(false),2000);};
  return(
    <Sheet title={ex.name} onClose={onClose}>
      <a href={`https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name+' execução musculação')}`} target="_blank" rel="noopener noreferrer"
        style={{display:'flex',alignItems:'center',gap:10,background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.3)',borderRadius:'var(--rsm)',padding:'10px 12px',marginBottom:14,textDecoration:'none'}}>
        <span style={{fontSize:18}}>▶️</span><div style={{flex:1}}><div style={{color:'var(--blue)',fontWeight:600,fontSize:13}}>Ver execução no YouTube</div></div><span style={{color:'var(--blue)',fontSize:15}}>→</span>
      </a>
      <div style={{display:'flex',gap:8,marginBottom:14}}>
        <div style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:'10px',flex:1,textAlign:'center'}}><div style={{fontSize:20,fontFamily:"'Bebas Neue',sans-serif",color:workout.color}}>{ex.sets}</div><div style={{fontSize:10,color:'var(--t3)'}}>SÉRIES</div></div>
        {last&&<><div style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:'10px',flex:1,textAlign:'center'}}><div style={{fontSize:20,fontFamily:"'Bebas Neue',sans-serif"}}>{last.weight}kg</div><div style={{fontSize:10,color:'var(--t3)'}}>ÚLTIMO</div></div>{last.reps&&<div style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:'10px',flex:1,textAlign:'center'}}><div style={{fontSize:20,fontFamily:"'Bebas Neue',sans-serif"}}>{last.reps}</div><div style={{fontSize:10,color:'var(--t3)'}}>REPS</div></div>}</>}
      </div>
      <div style={{display:'flex',gap:4,marginBottom:14,background:'var(--bg3)',borderRadius:'var(--rsm)',padding:3}}>
        {[['log','📝 Anotar'],['chart','📈 Gráfico'],['history','📋 Histórico']].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,border:'none',borderRadius:7,padding:'8px 4px',cursor:'pointer',fontSize:11,fontWeight:700,background:tab===t?workout.color:'transparent',color:tab===t?'#fff':'var(--t3)',fontFamily:'inherit',touchAction:'manipulation'}}>{l}</button>
        ))}
      </div>
      {tab==='log'&&<div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <div><label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:3,letterSpacing:1}}>CARGA (kg)</label><input value={weight} onChange={e=>setWeight(e.target.value)} placeholder={last?`${last.weight}`:'0'} type="number" inputMode="decimal" style={{background:'var(--bg3)',border:`1.5px solid ${workout.color}`,borderRadius:'var(--rsm)',color:workout.color,fontSize:28,fontWeight:900,textAlign:'center',padding:'12px',width:'100%',WebkitUserSelect:'text',userSelect:'text'}}/></div>
          <div><label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:3,letterSpacing:1}}>REPS</label><input value={reps} onChange={e=>setReps(e.target.value)} placeholder={last?.reps||'0'} type="number" inputMode="numeric" style={{background:'var(--bg3)',border:'1.5px solid var(--b1)',borderRadius:'var(--rsm)',color:'var(--t1)',fontSize:28,fontWeight:900,textAlign:'center',padding:'12px',width:'100%',WebkitUserSelect:'text',userSelect:'text'}}/></div>
        </div>
        <div style={{marginBottom:12}}><label style={{fontSize:10,color:'var(--t3)',display:'block',marginBottom:3,letterSpacing:1}}>OBSERVAÇÕES</label><input value={obs} onChange={e=>setObs(e.target.value)} placeholder="Técnica, sensação..." className="inp" style={{fontSize:13}}/></div>
        <Btn ch={saved?'✓ SALVA!':`💾 SALVAR — ${todayStr()}`} onClick={save} bg={saved?'var(--green)':workout.color} st={{transition:'background .3s'}}/>
      </div>}
      {tab==='chart'&&<div><div style={{display:'flex',gap:8,marginBottom:12}}>{[['week','7 dias'],['month','30 dias'],['all','Geral']].map(([p,l])=><button key={p} onClick={()=>setPeriod(p)} style={{flex:1,border:'none',borderRadius:8,padding:'8px',cursor:'pointer',fontSize:12,fontWeight:700,background:period===p?workout.color:'var(--bg3)',color:period===p?'#fff':'var(--t3)',fontFamily:'inherit',touchAction:'manipulation'}}>{l}</button>)}</div><MiniChart data={cd} color={workout.color}/></div>}
      {tab==='history'&&<div>{!hist.length&&<div style={{color:'var(--t3)',textAlign:'center',padding:'20px 0',fontSize:13}}>Nenhum registro ainda</div>}{hist.map((h,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--b2)'}}><div><div style={{fontSize:12,color:'var(--t3)'}}>{h.dateLabel}</div>{h.obs&&<div style={{fontSize:11,color:'var(--t4)',marginTop:1}}>{h.obs}</div>}</div><div><span style={{color:workout.color,fontWeight:700,fontSize:16}}>{h.weight}kg</span>{h.reps&&<span style={{color:'var(--t3)',fontSize:13,marginLeft:5}}>× {h.reps}</span>}</div></div>)}</div>}
    </Sheet>
  );
}

// ── WORKOUT DETAIL ───────────────────────────────────────
function WorkoutDetail({w,prog,uid,programs,setProgs,lh,setLh,onBack}){
  const [selEx,setSelEx]=useState(null);const [showAdd,setShowAdd]=useState(false);const [editEx,setEditEx]=useState(null);
  const [newEx,setNewEx]=useState({name:'',sets:2});const [menuEx,setMenuEx]=useState(null);
  const liveW=programs.find(p=>p.id===prog.id)?.workouts.find(ww=>ww.id===w.id)||w;
  const saveP=u=>{setProgs(u);UD.save(uid,'programs',u);};
  const saveLh=nh=>{setLh(nh);UD.save(uid,'lh',nh);};
  const sorted=liveW.exercises.slice().sort((a,b)=>(a.order??0)-(b.order??0));
  const {getHandle,getItem}=useTouchDrag(sorted,useCallback(ne=>{saveP(programs.map(p=>p.id===prog.id?{...p,workouts:p.workouts.map(ww=>ww.id===w.id?{...ww,exercises:ne.map((e,i)=>({...e,order:i}))}:ww)}:p));},[programs,prog.id,w.id]));
  const saveLoad=(wId,exId,entry)=>{const fe={...entry,date:todayISO(),dateLabel:todayStr()};const key=`${wId}_${exId}`;const prev=lh[key]||[];const idx=prev.findIndex(e=>e.date===fe.date);const upd=idx>=0?prev.map((e,i)=>i===idx?fe:e):[...prev,fe];saveLh({...lh,[key]:upd});};
  const addEx=()=>{if(!newEx.name.trim())return;saveP(programs.map(p=>p.id===prog.id?{...p,workouts:p.workouts.map(ww=>ww.id===w.id?{...ww,exercises:[...ww.exercises,{id:_id(),name:newEx.name.trim(),sets:newEx.sets,order:liveW.exercises.length}]}:ww)}:p));setShowAdd(false);setNewEx({name:'',sets:2});};
  const delEx=exId=>{if(!confirm('Remover exercício?'))return;saveP(programs.map(p=>p.id===prog.id?{...p,workouts:p.workouts.map(ww=>ww.id===w.id?{...ww,exercises:ww.exercises.filter(e=>e.id!==exId)}:ww)}:p));};
  const saveEditEx=()=>{if(!editEx.name.trim())return;saveP(programs.map(p=>p.id===prog.id?{...p,workouts:p.workouts.map(ww=>ww.id===w.id?{...ww,exercises:ww.exercises.map(e=>e.id===editEx.id?{...e,...editEx}:e)}:ww)}:p));setEditEx(null);};
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{background:`linear-gradient(180deg,${liveW.color}18,transparent)`,padding:'14px',flexShrink:0,borderBottom:'1px solid var(--b2)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={onBack} style={{background:'var(--bg3)',border:'none',color:'var(--t1)',width:38,height:38,borderRadius:10,cursor:'pointer',fontSize:18,touchAction:'manipulation',display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
          <div style={{flex:1}}><div style={{fontSize:10,color:liveW.color,fontWeight:700,letterSpacing:2}}>{prog.name.toUpperCase()} · {liveW.day.toUpperCase()}</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:1,lineHeight:1.1}}>{liveW.displayName||liveW.name}</div></div>
          <button onClick={()=>setShowAdd(true)} style={{background:liveW.color+'25',border:`1px solid ${liveW.color}55`,color:liveW.color,borderRadius:'var(--rsm)',padding:'7px 13px',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit',touchAction:'manipulation'}}>+ ADD</button>
        </div>
      </div>
      <div className="scroll" style={{padding:'10px 12px 0'}}>
        <div style={{fontSize:10,color:'var(--t4)',marginBottom:10,letterSpacing:1}}>TOQUE PARA ANOTAR · SEGURE ⠿ PARA MOVER</div>
        {sorted.map((ex,idx)=>{
          const hist=lh[`${liveW.id}_${ex.id}`]||[];const last=hist[hist.length-1];
          const gh=getHandle(idx);const gi=getItem(idx);
          return(
            <div key={ex.id} {...gi} style={{position:'relative',background:'var(--card)',border:`1px solid ${liveW.color}22`,borderRadius:'var(--r)',padding:'13px 14px',marginBottom:7,display:'flex',alignItems:'center',gap:10}}>
              <div {...gh} style={{...gh.style,color:'var(--t3)',fontSize:17,flexShrink:0,padding:'4px 2px'}}>⠿</div>
              <div style={{flex:1,cursor:'pointer',touchAction:'manipulation'}} onClick={()=>setSelEx(ex)}>
                <div style={{fontWeight:600,fontSize:14,lineHeight:1.3}}>{ex.name}</div>
                <div style={{fontSize:11,color:'var(--t3)',marginTop:1}}>{ex.sets} séries</div>
              </div>
              <div style={{cursor:'pointer',marginRight:4,touchAction:'manipulation'}} onClick={()=>setSelEx(ex)}>
                {last?<><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:liveW.color,textAlign:'right'}}>{last.weight}kg</div>{last.reps&&<div style={{fontSize:11,color:'var(--t3)',textAlign:'right'}}>{last.reps} reps</div>}</>:<div style={{fontSize:11,color:'var(--t4)'}}>Anotar</div>}
              </div>
              {/* FIX: Use CtxMenu for exercise actions to avoid touch conflicts */}
              <button onPointerDown={e=>{e.stopPropagation();setMenuEx(menuEx===ex.id?null:ex.id);}}
                style={{background:'none',border:'none',color:'var(--t2)',cursor:'pointer',padding:'8px 6px',fontSize:18,lineHeight:1,flexShrink:0,touchAction:'manipulation'}}>⋮</button>
              {menuEx===ex.id&&<CtxMenu
                items={[['✏️ Editar',()=>{setMenuEx(null);setEditEx({...ex});}],['🗑 Remover',()=>{setMenuEx(null);delEx(ex.id);},'var(--red)']]}
                onClose={()=>setMenuEx(null)}/>}
            </div>
          );
        })}

// ── FOOD LIST IN MEAL ────────────────────────────────────
function FoodListInMeal({meal,onUpdAmt,onDelFood,onEditFood,onReorder}){
  const sorted=useMemo(()=>meal.foods.slice().sort((a,b)=>(a.order??0)-(b.order??0)),[meal.foods]);
  const {getHandle,getItem}=useTouchDrag(sorted,useCallback(nf=>onReorder(nf),[onReorder]));
  return(
    <div>
      {sorted.map((f,idx)=>{
        const gh=getHandle(idx);const gi=getItem(idx);
        return(
          <div key={f.id} {...gi} style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:'10px 12px',marginBottom:7,border:'1px solid var(--b2)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
              <div style={{display:'flex',alignItems:'center',gap:7}}>
                <span {...gh} style={{...gh.style,color:'var(--t3)',fontSize:15,userSelect:'none',padding:'2px 3px'}}>⠿</span>
                <span style={{fontWeight:600,fontSize:13}}>{f.name}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{fontSize:12,color:'var(--cyan)',fontWeight:700}}>{Math.round(f.cal||0)}</span>
                <button onClick={()=>onEditFood({mealId:meal.id,food:{...f}})} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:13,padding:3,lineHeight:1,touchAction:'manipulation'}}>✏️</button>
                <button onClick={()=>onDelFood(meal.id,f.id)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:13,padding:3,lineHeight:1,touchAction:'manipulation'}}>✕</button>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="number" inputMode="decimal" defaultValue={f.amount} onBlur={e=>onUpdAmt(meal.id,f.id,e.target.value,f.unit)}
                style={{background:'var(--bg2)',border:'1px solid var(--b1)',borderRadius:7,color:'var(--t1)',width:78,textAlign:'center',fontSize:15,fontWeight:700,padding:'5px',flexShrink:0,WebkitUserSelect:'text',userSelect:'text'}}/>
              <span style={{color:'var(--t3)',fontSize:13}}>{f.unit}</span>
              <span style={{color:'var(--t4)',fontSize:11,marginLeft:'auto'}}>{Math.round(f.prot||0)}p/{Math.round(f.carb||0)}c/{Math.round(f.fat||0)}g</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  return(

// ── DIET TAB ─────────────────────────────────────────────
function DietTab({uid,diet,setDiet,goals,setGoals,profile}){
  const {state:dietS,set:setDietS,undo,redo,canUndo,canRedo}=useUndo(diet);
  const [undoMsg,setUndoMsg]=useState(null);const [openMeal,setOpenMeal]=useState(null);const [showAddFood,setShowAddFood]=useState(false);
  const [showGoals,setShowGoals]=useState(false);const [showAddMeal,setShowAddMeal]=useState(false);const [showSubs,setShowSubs]=useState(null);
  const [showMealEdit,setShowMealEdit]=useState(null);const [editingFood,setEditingFood]=useState(null);const [draftG,setDraftG]=useState(goals);
  const [nMeal,setNMeal]=useState({name:'',icon:'🍽️',pos:'end'});const [prevTotals,setPrevTotals]=useState(null);const [protM,setProtM]=useState(1.9);
  const pw=profile?.weight||0;
  useEffect(()=>{setDietS(diet,true);},[diet]);
  const save=(next,msg)=>{setDietS(next);setDiet(next);UD.save(uid,'diet',next);if(msg)setUndoMsg(msg);};
  const doUndo=()=>{undo();setTimeout(()=>{setDiet(dietS);UD.save(uid,'diet',dietS);setUndoMsg('Desfeito!');setTimeout(()=>setUndoMsg(null),2000);},50);};
  const doRedo=()=>{redo();setTimeout(()=>{setDiet(dietS);UD.save(uid,'diet',dietS);setUndoMsg('Refeito!');setTimeout(()=>setUndoMsg(null),2000);},50);};
  const sorted=useMemo(()=>dietS.slice().sort((a,b)=>(a.order??0)-(b.order??0)),[dietS]);
  const totals=useMemo(()=>sumM(dietS.flatMap(m=>m.foods)),[dietS]);
  const mt=m=>sumM(m.foods);
  const {getHandle:mH,getItem:mI}=useTouchDrag(sorted,useCallback(nm=>{save(nm.map((m,i)=>({...m,order:i})));},[dietS]));
  const addFood=(mealId,food)=>{save(dietS.map(m=>m.id===mealId?{...m,foods:[...m.foods,{...food,id:_id(),order:m.foods.length}]}:m),'Alimento adicionado');setShowAddFood(false);};
  const delFood=(mealId,fid)=>{save(dietS.map(m=>m.id===mealId?{...m,foods:m.foods.filter(f=>f.id!==fid)}:m),'Alimento removido');};
  const updAmt=(mealId,fid,newAmt,newUnit)=>{const meal=dietS.find(m=>m.id===mealId);const food=meal?.foods.find(f=>f.id===fid);if(!food)return;save(dietS.map(m=>m.id===mealId?{...m,foods:m.foods.map(f=>f.id===fid?recomp(food,newAmt,newUnit):f)}:m));};
  const addMeal=()=>{
    if(!nMeal.name.trim())return;
    const meal={id:_id(),name:nMeal.name.trim(),icon:nMeal.icon,subKey:null,mealTitle:null,order:0,foods:[],presetStates:{},customSubs:[]};
    let u;if(nMeal.pos==='start')u=[{...meal,order:0},...dietS.map((m,i)=>({...m,order:i+1}))];
    else if(nMeal.pos==='end')u=[...dietS,{...meal,order:dietS.length}];
    else{const i=parseInt(nMeal.pos);u=[...dietS.slice(0,i),{...meal,order:i},...dietS.slice(i)].map((m,ii)=>({...m,order:ii}));}
    save(u,'Refeição adicionada');setShowAddMeal(false);setNMeal({name:'',icon:'🍽️',pos:'end'});
  };
  const delMeal=mid=>{if(!confirm('Remover refeição?'))return;save(dietS.filter(m=>m.id!==mid).map((m,i)=>({...m,order:i})),'Refeição removida');if(openMeal?.id===mid)setOpenMeal(null);};
  const applyMealEdit=um=>{save(dietS.map(m=>m.id===um.id?um:m),'Refeição editada');setShowMealEdit(null);};
  const saveMealFromSubs=um=>{save(dietS.map(m=>m.id===um.id?um:m),'Substituição salva');setShowSubs(null);};
  const calPct=Math.min((totals.cal/goals.cal)*100,100);const calColor=calPct>105?'var(--red)':calPct>90?'var(--purple)':'var(--cyan)';
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>

                  <button onClick={()=>delMeal(meal.id)} style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',color:'var(--red)',borderRadius:8,padding:'7px 10px',cursor:'pointer',fontSize:12,fontFamily:'inherit',touchAction:'manipulation'}}>🗑</button>

                <button onClick={()=>{setOpenMeal(meal);setShowAddFood(true);}} style={{background:'rgba(59,130,246,.1)',border:'1px solid rgba(59,130,246,.25)',color:'var(--blue)',borderRadius:'var(--rsm)',padding:'10px',width:'100%',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit',marginTop:4,touchAction:'manipulation'}}>+ Adicionar Alimento</button>
              </div>}
            </div>
          );
        })}
      </div>
      {showAddFood&&openMeal&&<Sheet title={`Adicionar em ${openMeal.name}`} onClose={()=>setShowAddFood(false)}><FoodSearch onSelect={food=>addFood(openMeal.id,food)} onCancel={()=>setShowAddFood(false)}/></Sheet>}
      {editingFood&&<Sheet title="Editar Alimento" onClose={()=>setEditingFood(null)}>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>NOME</label>
        <input value={editingFood.food.name} onChange={e=>setEditingFood(p=>({...p,food:{...p.food,name:e.target.value}}))} className="inp" style={{marginBottom:12}}/>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10,marginBottom:12}}>
          <div><label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4}}>QUANTIDADE</label><input type="number" value={editingFood.food.amount} onChange={e=>setEditingFood(p=>({...p,food:{...p.food,amount:parseFloat(e.target.value)||0}}))} className="inp" style={{textAlign:'center',fontSize:18,fontWeight:700}}/></div>
          <div><label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4}}>UNIDADE</label><select value={editingFood.food.unit} onChange={e=>setEditingFood(p=>({...p,food:{...p.food,unit:e.target.value}}))} className="inp" style={{WebkitAppearance:'none',appearance:'none'}}><option>g</option><option>ml</option><option>unid</option></select></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:18}}>
          {[['cal','Kcal','var(--cyan)'],['prot','Proteínas','var(--blue)'],['carb','Carboidratos','var(--purple)'],['fat','Gorduras','var(--bluel)']].map(([k,l,c])=>(
            <div key={k}><label style={{fontSize:10,color:c,display:'block',marginBottom:3}}>{l}</label><input type="number" value={editingFood.food[k]||''} onChange={e=>setEditingFood(p=>({...p,food:{...p.food,[k]:parseFloat(e.target.value)||0}}))} className="inp" style={{fontSize:13,padding:'8px'}} placeholder="0"/></div>
          ))}
        </div>
        <Btn ch="SALVAR" onClick={()=>{const f=editingFood.food;save(dietS.map(m=>m.id===editingFood.mealId?{...m,foods:m.foods.map(ff=>ff.id===f.id?f:ff)}:m),'Alimento editado');setEditingFood(null);}}/>
      </Sheet>}
      {showMealEdit&&<MealEditSheet meal={showMealEdit} onSave={applyMealEdit} onClose={()=>setShowMealEdit(null)}/>}
      {showAddMeal&&<Sheet title="Nova Refeição" onClose={()=>setShowAddMeal(false)}>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>NOME</label>
        <input value={nMeal.name} onChange={e=>setNMeal(p=>({...p,name:e.target.value}))} placeholder="Ex: Pré-treino, Lanche, Ceia..." className="inp" style={{marginBottom:12}}/>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:8,letterSpacing:1}}>ÍCONE</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>{MEAL_ICONS.map(ic=><button key={ic} onClick={()=>setNMeal(p=>({...p,icon:ic}))} style={{fontSize:18,background:nMeal.icon===ic?'rgba(59,130,246,.3)':'transparent',border:nMeal.icon===ic?'1px solid var(--blue)':'1px solid var(--b1)',borderRadius:7,padding:'6px 8px',cursor:'pointer',width:38,touchAction:'manipulation'}}>{ic}</button>)}</div>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:6,letterSpacing:1}}>POSIÇÃO</label>
        <select value={nMeal.pos} onChange={e=>setNMeal(p=>({...p,pos:e.target.value}))} className="inp" style={{marginBottom:18,WebkitAppearance:'none',appearance:'none'}}>

          {sorted.map((m,i)=><option key={m.id} value={String(i+1)}>Após "{m.name}"</option>)}

      {showSubs&&<SubsPanel meal={showSubs} onApply={()=>{}} onSaveMeal={saveMealFromSubs} onClose={()=>setShowSubs(null)}/>}
      {showGoals&&<Sheet title="Metas Diárias" onClose={()=>setShowGoals(false)}>

        <input type="number" inputMode="numeric" value={draftG.cal} onChange={e=>setDraftG(p=>({...p,cal:+e.target.value}))} style={{background:'var(--bg3)',border:'1.5px solid var(--cyan)',borderRadius:'var(--rsm)',color:'var(--cyan)',fontSize:28,fontWeight:900,textAlign:'center',padding:'14px',width:'100%',marginBottom:12,WebkitUserSelect:'text',userSelect:'text'}}/>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
          {[['prot','Proteínas','var(--blue)'],['carb','Carboidratos','var(--purple)'],['fat','Gorduras','var(--bluel)']].map(([k,l,c])=>(
            <div key={k}><label style={{fontSize:10,color:c,display:'block',marginBottom:4,letterSpacing:1}}>{l} (g)</label><input type="number" inputMode="numeric" value={draftG[k]} onChange={e=>setDraftG(p=>({...p,[k]:+e.target.value}))} className="inp" style={{textAlign:'center',color:c,fontWeight:800,fontSize:18,padding:'10px 6px'}}/></div>

        <Btn ch="SALVAR METAS" onClick={()=>{setGoals(draftG);UD.save(uid,'goals',draftG);setShowGoals(false);}}/>
      </Sheet>}
      {(undoMsg||canUndo)&&<UndoBar msg={undoMsg||'Alteração feita'} onUndo={doUndo} onRedo={doRedo} canUndo={canUndo} canRedo={canRedo} onDismiss={()=>setUndoMsg(null)}/>}
    </div>
  );
}

// ── SHAPE TAB ────────────────────────────────────────────
function ShapeTab({uid,shapeData,setShapeData,profile,setProfile}){
  const [showAdd,setShowAdd]=useState(false);const [showProf,setShowProf]=useState(false);
  const [draft,setDraft]=useState({date:todayISO(),weight:'',bodyfat:'',waist:'',chest:'',arm:'',thigh:'',notes:'',goal:''});
  const [draftProf,setDraftProf]=useState(profile);
  const save=u=>{setShapeData(u);UD.save(uid,'shape',u);};
  const saveProf=()=>{setProfile(draftProf);UD.save(uid,'profile',draftProf);setShowProf(false);};
  const addEntry=()=>{if(!draft.weight)return;const e={id:_id(),...draft,dateLabel:new Date(draft.date+'T12:00:00').toLocaleDateString('pt-BR')};save([...shapeData,e].sort((a,b)=>a.date.localeCompare(b.date)));setShowAdd(false);setDraft({date:todayISO(),weight:'',bodyfat:'',waist:'',chest:'',arm:'',thigh:'',notes:'',goal:''});};
  const delEntry=id=>{if(!confirm('Remover?'))return;save(shapeData.filter(e=>e.id!==id));};
  const latest=shapeData[shapeData.length-1],first=shapeData[0];
  const wData=shapeData.map(e=>({d:e.date,v:parseFloat(e.weight)||0})).filter(d=>d.v>0);
  const bfData=shapeData.filter(e=>e.bodyfat).map(e=>({d:e.date,v:parseFloat(e.bodyfat)||0,u:'%'}));
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{padding:'14px 14px 10px',flexShrink:0,background:'var(--bg)',borderBottom:'1px solid var(--b2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div><div style={{fontSize:10,color:'var(--violet)',fontWeight:700,letterSpacing:3}}>FÍSICO</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:1}}>Acompanhamento</div></div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={()=>{setDraftProf({...profile});setShowProf(true);}} style={{background:'rgba(167,139,250,.15)',border:'1px solid rgba(167,139,250,.35)',color:'var(--violet)',borderRadius:'var(--rsm)',padding:'7px 10px',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit',touchAction:'manipulation'}}>👤 Perfil</button>
            <button onClick={()=>setShowAdd(true)} style={{background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.35)',color:'var(--blue)',borderRadius:'var(--rsm)',padding:'7px 10px',cursor:'pointer',fontSize:11,fontWeight:700,fontFamily:'inherit',touchAction:'manipulation'}}>+ Registro</button>
          </div>
        </div>
      </div>
      <div className="scroll" style={{padding:12}}>
        {profile&&(profile.weight||profile.height)&&<div style={{background:'var(--card)',border:'1px solid rgba(167,139,250,.3)',borderRadius:'var(--rlg)',padding:16,marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--violet)',fontWeight:700,letterSpacing:2,marginBottom:10}}>MEU PERFIL</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7}}>
            {[['Gênero',profile.gender||'—','var(--violet)'],['Peso',profile.weight?(profile.weight+'kg'):'—','var(--blue)'],['Altura',profile.height?(profile.height+'cm'):'—','var(--cyan)'],['IMC',profile.weight&&profile.height?(profile.weight/((profile.height/100)**2)).toFixed(1):'—','var(--purple)']].map(([l,v,c])=>(
              <div key={l} style={{background:'var(--bg3)',borderRadius:'var(--rsm)',padding:'9px 5px',textAlign:'center',border:'1px solid var(--b2)'}}><div style={{fontSize:13,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:9,color:'var(--t4)',marginTop:2}}>{l}</div></div>
            ))}
          </div>
          {profile.goal&&<div style={{marginTop:10,background:'rgba(59,130,246,.1)',borderRadius:8,padding:'8px 12px',fontSize:13,color:'var(--blue)'}}>🎯 {profile.goal}</div>}
        </div>}
        {shapeData.length>0&&latest&&<div style={{background:'var(--card)',border:'1px solid var(--b1)',borderRadius:'var(--rlg)',padding:16,marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--t3)',letterSpacing:1,marginBottom:10}}>EVOLUÇÃO — {shapeData.length} registro{shapeData.length!==1?'s':''}</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div style={{background:'var(--bg3)',borderRadius:11,padding:14,border:'1px solid var(--b2)'}}><div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>PESO ATUAL</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:'var(--blue)'}}>{latest.weight}kg</div>{first&&first.weight!==latest.weight&&<div style={{fontSize:12,color:parseFloat(latest.weight)>parseFloat(first.weight)?'var(--green)':'var(--red)'}}>{parseFloat(latest.weight)>parseFloat(first.weight)?'+':''}{(parseFloat(latest.weight)-parseFloat(first.weight)).toFixed(1)}kg</div>}</div>
            {latest.bodyfat&&<div style={{background:'var(--bg3)',borderRadius:11,padding:14,border:'1px solid var(--b2)'}}><div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>GORDURA</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:'var(--purple)'}}>{latest.bodyfat}%</div>{first&&first.bodyfat&&<div style={{fontSize:12,color:parseFloat(latest.bodyfat)<parseFloat(first.bodyfat)?'var(--green)':'var(--red)'}}>{parseFloat(latest.bodyfat)<parseFloat(first.bodyfat)?'-':'+'}{Math.abs(parseFloat(latest.bodyfat)-parseFloat(first.bodyfat)).toFixed(1)}%</div>}</div>}
          </div>
        </div>}
        {wData.length>1&&<div style={{background:'var(--card)',border:'1px solid var(--b1)',borderRadius:'var(--r)',padding:14,marginBottom:12}}><div style={{fontSize:10,color:'var(--t3)',marginBottom:8,letterSpacing:1}}>EVOLUÇÃO DO PESO</div><MiniChart data={wData} color="var(--blue)"/></div>}
        {bfData.length>1&&<div style={{background:'var(--card)',border:'1px solid var(--b1)',borderRadius:'var(--r)',padding:14,marginBottom:12}}><div style={{fontSize:10,color:'var(--t3)',marginBottom:8,letterSpacing:1}}>GORDURA CORPORAL %</div><MiniChart data={bfData} color="var(--purple)"/></div>}
        {!shapeData.length&&<div style={{textAlign:'center',padding:'48px 0',color:'var(--t3)'}}><div style={{fontSize:48,marginBottom:12}}>📸</div><div style={{fontSize:16,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:1}}>Nenhum registro ainda</div><div style={{fontSize:13,marginTop:6,color:'var(--t4)'}}>Toque em "+ Registro"</div></div>}
        {shapeData.slice().reverse().map(entry=>(
          <div key={entry.id} style={{background:'var(--card)',border:'1px solid var(--b1)',borderRadius:'var(--r)',padding:14,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
              <div><div style={{fontSize:12,color:'var(--violet)',fontWeight:700}}>{entry.dateLabel}</div>{entry.goal&&<div style={{fontSize:11,color:'var(--blue)',marginTop:2}}>🎯 {entry.goal}</div>}</div>
              <button onClick={()=>delEntry(entry.id)} style={{background:'none',border:'none',color:'var(--t4)',cursor:'pointer',fontSize:16,touchAction:'manipulation'}}>✕</button>
            </div>
            <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
              {[['Peso',entry.weight,'kg','var(--blue)'],['BF%',entry.bodyfat,'%','var(--purple)'],['Cintura',entry.waist,'cm','var(--cyan)'],['Peito',entry.chest,'cm','var(--bluel)'],['Braço',entry.arm,'cm','var(--violet)'],['Coxa',entry.thigh,'cm','var(--teal)']].filter(([,v])=>v).map(([l,v,u,c])=>(
                <div key={l} style={{background:'var(--bg3)',borderRadius:7,padding:'5px 9px',border:'1px solid var(--b2)'}}><div style={{fontSize:12,fontWeight:800,color:c}}>{v}{u}</div><div style={{fontSize:9,color:'var(--t4)'}}>{l}</div></div>
              ))}
            </div>
            {entry.notes&&<div style={{marginTop:9,fontSize:12,color:'var(--t3)',background:'var(--bg3)',borderRadius:7,padding:'7px 10px'}}>{entry.notes}</div>}
          </div>
        ))}
      </div>
      {showAdd&&<Sheet title="Novo Registro" onClose={()=>setShowAdd(false)}>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>DATA</label><input type="date" value={draft.date} onChange={e=>setDraft(p=>({...p,date:e.target.value}))} className="inp" style={{marginBottom:12}}/>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>OBJETIVO</label>
        <select value={draft.goal} onChange={e=>setDraft(p=>({...p,goal:e.target.value}))} className="inp" style={{marginBottom:12,WebkitAppearance:'none',appearance:'none'}}><option value="">Selecionar...</option>{GOALS_OPT.map(g=><option key={g} value={g}>{g}</option>)}</select>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div><label style={{fontSize:10,color:'var(--blue)',display:'block',marginBottom:3}}>PESO (kg) *</label><input type="number" inputMode="decimal" value={draft.weight} onChange={e=>setDraft(p=>({...p,weight:e.target.value}))} className="inp" style={{color:'var(--blue)',fontWeight:700,textAlign:'center',fontSize:18}} placeholder="0.0"/></div>
          <div><label style={{fontSize:10,color:'var(--purple)',display:'block',marginBottom:3}}>GORDURA (%)</label><input type="number" inputMode="decimal" value={draft.bodyfat} onChange={e=>setDraft(p=>({...p,bodyfat:e.target.value}))} className="inp" style={{textAlign:'center'}} placeholder="0.0"/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          {[['waist','Cintura (cm)','var(--cyan)'],['chest','Peito (cm)','var(--bluel)'],['arm','Braço (cm)','var(--violet)'],['thigh','Coxa (cm)','var(--teal)']].map(([k,l,c])=>(
            <div key={k}><label style={{fontSize:10,color:c,display:'block',marginBottom:3}}>{l}</label><input type="number" inputMode="decimal" value={draft[k]} onChange={e=>setDraft(p=>({...p,[k]:e.target.value}))} className="inp" style={{textAlign:'center'}} placeholder="0"/></div>
          ))}
        </div>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>OBSERVAÇÕES</label>
        <input value={draft.notes} onChange={e=>setDraft(p=>({...p,notes:e.target.value}))} placeholder="Como está o físico..." className="inp" style={{marginBottom:18}}/>
        <Btn ch="SALVAR REGISTRO" onClick={addEntry} bg="var(--violet)"/>
      </Sheet>}
      {showProf&&<Sheet title="Meu Perfil" onClose={()=>setShowProf(false)}>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>GÊNERO</label>
        <div style={{display:'flex',gap:8,marginBottom:12}}>{['Masculino','Feminino','Outro'].map(g=><button key={g} onClick={()=>setDraftProf(p=>({...p,gender:g}))} style={{flex:1,border:`1px solid ${draftProf.gender===g?'var(--violet)':'var(--b1)'}`,borderRadius:'var(--rsm)',padding:'10px',cursor:'pointer',fontWeight:700,fontSize:12,background:draftProf.gender===g?'rgba(167,139,250,.2)':'transparent',color:draftProf.gender===g?'#fff':'var(--t3)',fontFamily:'inherit',touchAction:'manipulation'}}>{g}</button>)}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
          <div><label style={{fontSize:10,color:'var(--blue)',display:'block',marginBottom:3}}>PESO (kg)</label><input type="number" inputMode="decimal" value={draftProf.weight||''} onChange={e=>setDraftProf(p=>({...p,weight:parseFloat(e.target.value)||0}))} className="inp" style={{textAlign:'center',fontSize:18,fontWeight:700,color:'var(--blue)'}} placeholder="0"/></div>
          <div><label style={{fontSize:10,color:'var(--cyan)',display:'block',marginBottom:3}}>ALTURA (cm)</label><input type="number" inputMode="numeric" value={draftProf.height||''} onChange={e=>setDraftProf(p=>({...p,height:parseFloat(e.target.value)||0}))} className="inp" style={{textAlign:'center',fontSize:18,fontWeight:700,color:'var(--cyan)'}} placeholder="0"/></div>
        </div>
        <label style={{fontSize:11,color:'var(--t3)',display:'block',marginBottom:4,letterSpacing:1}}>OBJETIVO PRINCIPAL</label>
        <select value={draftProf.goal||''} onChange={e=>setDraftProf(p=>({...p,goal:e.target.value}))} className="inp" style={{marginBottom:18,WebkitAppearance:'none',appearance:'none'}}><option value="">Selecionar...</option>{GOALS_OPT.map(g=><option key={g} value={g}>{g}</option>)}</select>
        <Btn ch="SALVAR PERFIL" onClick={saveProf} bg="var(--violet)"/>
      </Sheet>}
    </div>
  );
}

// ── ROOT APP ─────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);const [tab,setTab]=useState('workout');
  const [programs,setProgs]=useState([]);const [diet,setDiet]=useState([]);const [lh,setLh]=useState({});
  const [goals,setGoals]=useState({cal:2800,prot:180,carb:350,fat:80});const [shape,setShape]=useState([]);const [profile,setProfile]=useState({gender:'',weight:0,height:0,goal:''});
  const [booting,setBooting]=useState(true);

  const loadUser=(uid,acctType)=>{
    try{
      const h=hydrateUser(uid);
      setProgs(acctType==='new'?[]:(h.programs||[]));
      setDiet(acctType==='new'?[]:(h.diet||[]));
      setLh(h.lh||{});setGoals(h.goals||{cal:2800,prot:180,carb:350,fat:80});setShape(h.shape||[]);setProfile(h.profile||{gender:'',weight:0,height:0,goal:''});
    }catch{setProgs([]);setDiet([]);setLh({});setGoals({cal:2800,prot:180,carb:350,fat:80});setShape([]);setProfile({gender:'',weight:0,height:0,goal:''});}
    setBooting(false);
  };

  useEffect(()=>{
    try{const s=Acct.session.get();if(s?.uid&&Acct.get(s.uid)){setUser({uid:s.uid,rec:Acct.get(s.uid)});loadUser(s.uid,'existing');return;}}catch{}
    setBooting(false);
  },[]);

  const onLogin=(uid,rec,acctType)=>{setUser({uid,rec});loadUser(uid,acctType);};
  const handleProfileChange=useCallback(np=>{setProfile(np);UD.save(user.uid,'profile',np);if(np.weight&&np.weight!==profile.weight){const ng=smartGoals(goals.cal,np.weight);setGoals(ng);UD.save(user.uid,'goals',ng);}},[user,goals,profile]);

  if(booting)return(<div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}><div style={{textAlign:'center'}}><div style={{fontSize:48,marginBottom:12}}>💪</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:'var(--blue)',letterSpacing:3}}>Carregando...</div></div></div>);
  if(!user)return <LoginScreen onLogin={onLogin}/>;

  const TABS=[{k:'workout',l:'Treino',i:'💪',c:'var(--blue)'},{k:'diet',l:'Dieta',i:'🥗',c:'var(--cyan)'},{k:'shape',l:'Shape',i:'📸',c:'var(--violet)'}];
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px 6px',background:'var(--bg)',borderBottom:'1px solid var(--b2)',flexShrink:0}}>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:2,background:'linear-gradient(90deg,#fff,var(--blue))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>GANHOS BRUTAIS</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:12,color:'var(--t3)'}}>👤 {user.rec.name}</span>
          <button onClick={()=>{Acct.session.clear();setUser(null);}} style={{background:'var(--bg3)',border:'1px solid var(--b1)',color:'var(--t3)',fontSize:11,cursor:'pointer',padding:'5px 10px',borderRadius:7,fontFamily:'inherit',touchAction:'manipulation'}}>Sair</button>
        </div>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {tab==='workout'&&<WorkoutTab uid={user.uid} programs={programs} setProgs={setProgs} lh={lh} setLh={setLh}/>}
        {tab==='diet'&&<DietTab uid={user.uid} diet={diet} setDiet={setDiet} goals={goals} setGoals={setGoals} profile={profile}/>}
        {tab==='shape'&&<ShapeTab uid={user.uid} shapeData={shape} setShapeData={setShape} profile={profile} setProfile={handleProfileChange}/>}
      </div>
      <div style={{flexShrink:0,background:'var(--bg)',borderTop:'1px solid var(--b2)',display:'flex',paddingBottom:'max(10px,env(safe-area-inset-bottom,0px))'}}>
        {TABS.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:1,background:'transparent',border:'none',color:tab===t.k?t.c:'var(--t4)',padding:'11px 0 8px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,touchAction:'manipulation'}}>
            <span style={{fontSize:20}}>{t.i}</span>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:1}}>{t.l.toUpperCase()}</span>
            {tab===t.k&&<div style={{width:16,height:2,background:t.c,borderRadius:2,marginTop:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
